<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 240px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: #f5f2ed;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .header img {
      width: 20px;
      height: 20px;
    }

    .header h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle-label {
      font-size: 12px;
      color: #aaa;
    }

    /* Toggle switch */
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: #444;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    input:checked + .slider {
      background: #d6001c;
    }

    input:checked + .slider::before {
      transform: translateX(18px);
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="" />
    <h1>Trump Redacted</h1>
  </div>
  <div class="toggle-row">
    <span class="toggle-label">Redaction enabled</span>
    <label class="switch">
      <input type="checkbox" id="toggle" checked />
      <span class="slider"></span>
    </label>
  </div>
  <script src="popup.js"></script>
</body>
</html>
